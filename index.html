<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>سبورت بوك التيميت | SportBook Ultimate</title>
  <!-- Font Awesome & Leaflet CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- مكتبات إضافية للرسوم البيانية والتصدير -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- ملف الأنماط المخصص -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="app-container header-content">
      <div class="logo">
        <h1><i class="fas fa-futbol"></i> سبورت بوك التيميت</h1>
      </div>
      <div style="display: flex; align-items: center; gap: 16px;">
        <button class="btn-sm" id="toggleLangBtn"><i class="fas fa-language"></i> <span id="langText">English</span></button>
        <div class="user-area" id="userArea"></div>
      </div>
      <nav id="mainNav"></nav>
    </div>
  </header>

  <main class="app-container">
    <!-- الصفحة الرئيسية -->
    <section id="home" class="section active">
      <div class="card">
        <h2><i class="fas fa-map-marked-alt"></i> <span data-i18n="explore">استكشف الملاعب والمدربين</span></h2>
        <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px;">
          <button id="getCustomerLocationBtn" class="btn-outline" style="width:auto;"><i class="fas fa-location-dot"></i> <span data-i18n="locateMe">حدد موقعي</span></button>
          <div style="display: flex; gap: 8px; align-items: center;">
            <input type="text" id="manualLocationInput" placeholder="ابحث عن مدينة أو عنوان..." style="width:200px; padding:8px 12px; border-radius: 40px; border:1px solid #ccc;">
            <button id="searchLocationBtn" class="btn-sm btn-outline"><i class="fas fa-search-location"></i></button>
            <button id="resetLocationBtn" class="btn-sm btn-outline"><i class="fas fa-sync-alt"></i></button>
          </div>
        </div>
        <div style="display: flex; gap: 8px; margin-bottom: 16px;">
          <button id="showCourtsBtn" class="btn-outline active toggle-view-btn">🏟️ الملاعب</button>
          <button id="showCoachesBtn" class="btn-outline toggle-view-btn">👤 المدربين</button>
        </div>
        <div id="map"></div>
        <div class="filter-bar">
          <select id="sportFilter" class="filter-select"></select>
          <div class="add-sport-group">
            <input type="text" id="newSportInput" placeholder="رياضة جديدة" style="flex:1;">
            <button type="button" id="addSportBtn"><i class="fas fa-plus"></i></button>
          </div>
          <button id="filterBtn" class="btn btn-primary" style="width:auto; padding:12px 24px;"><i class="fas fa-search"></i> بحث</button>
        </div>
        <div id="venuesList" class="venues-grid"></div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:16px;">
          <div class="currency-notice" id="currencyNotice"></div>
          <div class="currency-selector">
            <label for="manualCurrencySelect">تغيير العملة:</label>
            <select id="manualCurrencySelect" class="filter-select" style="width:auto; padding:8px 12px;">
              <option value="SAR">ريال سعودي (SAR)</option>
              <option value="AED">درهم إماراتي (AED)</option>
              <option value="EGP">جنيه مصري (EGP)</option>
              <option value="USD">دولار أمريكي (USD)</option>
              <option value="EUR">يورو (EUR)</option>
            </select>
          </div>
        </div>
      </div>
      <div class="card" id="cartSection">
        <h2><i class="fas fa-shopping-cart"></i> سلة الحجوزات <span id="cartCount" class="badge">0</span></h2>
        <div id="cartItemsList"></div>
        <div id="penaltyNotice" style="display:none; background:#fef3c7; padding:8px; border-radius:12px; margin:8px 0;"></div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <strong>الإجمالي: <span id="cartTotal">0</span> <span id="cartCurrency">ريال</span></strong>
          <button id="checkoutCartBtn" class="btn btn-primary" style="width:auto;" disabled>إتمام حجز الكل</button>
        </div>
      </div>
      <div class="card" id="customerBookingsSection" style="display:none;">
        <h2><i class="fas fa-calendar-check"></i> حجوزاتي</h2>
        <div id="customerBookingsList"></div>
      </div>
    </section>

    <!-- تسجيل منشأة -->
    <section id="registerVenue" class="section">
      <div class="card">
        <h2><i class="fas fa-store"></i> تسجيل منشأة رياضية</h2>
        <form id="registerVenueForm">
          <div class="form-group"><label>اسم المنشأة</label><input type="text" id="venueName" required></div>
          <div class="form-group"><label>وصف</label><textarea id="venueDesc"></textarea></div>
          <div class="form-group"><label>صورة</label><input type="file" id="venueImage" accept="image/*"></div>
          <div class="form-group">
            <label><i class="fas fa-map-pin"></i> الموقع الجغرافي</label>
            <div style="display:flex; gap:8px; margin-bottom:8px;"><input type="text" id="venueLat" placeholder="خط العرض" readonly required><input type="text" id="venueLng" placeholder="خط الطول" readonly required></div>
            <button type="button" id="getVenueLocationBtn" class="btn-sm"><i class="fas fa-location-dot"></i> تحديد موقعي الحالي (GPS)</button>
            <div class="register-map-container"><div id="registerMiniMap"></div></div>
          </div>
          <div class="form-group"><label>رقم الهاتف</label><input type="tel" id="venuePhone" placeholder="9665xxxxxxxx" required></div>
          <div class="form-group">
            <label><i class="fas fa-money-bill"></i> تسعير الساعات (<span id="currencySymbol1">ريال</span>/ساعة)</label>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
              <div><label>12:00ص-7:00ص</label><input type="number" id="pricePeriod1" min="0" value="40" step="5"></div>
              <div><label>7:00ص-11:00ص</label><input type="number" id="pricePeriod2" min="0" value="50" step="5"></div>
              <div><label>11:00ص-4:00م</label><input type="number" id="pricePeriod3" min="0" value="60" step="5"></div>
              <div><label>4:00م-12:00ص</label><input type="number" id="pricePeriod4" min="0" value="70" step="5"></div>
            </div>
          </div>
          <div class="form-group">
            <label><i class="fas fa-cog"></i> إعدادات إضافية</label>
            <label><input type="checkbox" id="regVenueHasCapacity"> طاقة استيعابية محددة</label>
            <div id="regCapacityFields" style="display:none;"><label>الحد الأقصى</label><input type="number" id="regVenueMaxCapacity" min="1" value="10"></div>
            <label><input type="checkbox" id="regVenueAllowSharing"> السماح بالمشاركة</label>
          </div>
          <div class="form-group"><label>الملاعب التابعة</label><div id="courtsListContainer"></div><button type="button" id="addCourtBtn" class="btn-outline btn-sm"><i class="fas fa-plus"></i> إضافة ملعب</button></div>
          <button type="submit" class="btn btn-primary">تسجيل المنشأة والملاعب</button>
        </form>
      </div>
    </section>

    <!-- تسجيل مدرب خصوصي -->
    <section id="registerCoach" class="section">
      <div class="card">
        <h2><i class="fas fa-chalkboard-user"></i> تسجيل مدرب خصوصي</h2>
        <form id="registerCoachForm">
          <div class="form-group"><label>الاسم الكامل</label><input type="text" id="coachName" required></div>
          <div class="form-group"><label>الرياضة</label><select id="coachSport"></select></div>
          <div class="form-group"><label>وصف</label><textarea id="coachDesc"></textarea></div>
          <div class="form-group"><label>صورة</label><input type="file" id="coachImage" accept="image/*"></div>
          <div class="form-group">
            <label><i class="fas fa-map-pin"></i> الموقع</label>
            <div style="display:flex; gap:8px;"><input type="text" id="coachLat" placeholder="خط العرض" readonly required><input type="text" id="coachLng" placeholder="خط الطول" readonly required></div>
            <button type="button" id="getCoachLocationBtn" class="btn-sm"><i class="fas fa-location-dot"></i> تحديد موقعي</button>
            <div class="register-map-container"><div id="coachRegisterMap"></div></div>
          </div>
          <div class="form-group"><label>رقم الهاتف</label><input type="tel" id="coachPhone" placeholder="9665xxxxxxxx" required></div>
          <div class="form-group"><label>سعر الساعة (<span id="coachCurrencySymbol">ريال</span>)</label><input type="number" id="coachHourlyRate" min="0" value="100" step="10" required></div>
          <button type="submit" class="btn btn-primary">تسجيل كمدرب</button>
        </form>
      </div>
    </section>

    <!-- باقي الأقسام (الموجودة في النسخة السابقة): venueDashboard, coachDashboard, adminDashboard, profile, favorites, analytics, openInvitations, store, teams, teamInvitations -->

  </main>

  <!-- المودالات (كما في الإصدار الكامل السابق: editVenueModal, bookingModal, manageBookingModal, ratingModal, customerRatingModal, courtModal, coachAvailabilityModal, invitationModal, teamModal, storeModal, productModal, notificationsModal, authModal, paymentModal, confirmModal) -->

  <div id="toast" class="toast-msg"></div>
  <div id="globalLoader" class="loader" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:3000;"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
